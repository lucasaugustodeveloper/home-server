name: 'Suwayomi'

services:
  suwayomi:
    image: ghcr.io/suwayomi/suwayomi-server:preview
    environment:
      TZ: America/Sao_Paulo
      FLARESOLVERR_ENABLED: true
      FLARESOLVERR_URL: http://flaresolverr:8191
      BIND_IP: 0.0.0.0
      BIND_PORT: 4567
      DOWNLOAD_AS_CBZ: true
      AUTH_MODE: ui_login
      AUTH_USERNAME: lucas
      AUTH_PASSWORD: 123456
      DATABASE_TYPE: postgresql
      DATABASE_URL: postgresql://postgres:5432/manga
      DATABASE_USERNAME: manga
      DATABASE_PASSWORD: manga
      # EXTENSION_REPOS: ["https://raw.githubusercontent.com/keiyoushi/extensions/repo/index.min.json"]
    volumes:
      - $HOME/home_server/suwayomi:/home/suwayomi/.local/share/Tachidesk
    ports:
      - 4567:4567
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: postgresql
    environment:
      POSTGRES_USER: manga
      POSTGRES_PASSWORD: manga
      PGDATA: /data/postgres
      POSTGRES_DB: manga

  flaresolverr:
    image: flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      TZ: America/Sao_Paulo
    restart: unless-stopped
