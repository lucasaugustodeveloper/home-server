name: "media"

services:
    qbittorrent:
        container_name: qbittorrent
        image: linuxserver/qbittorrent:latest
        restart: unless-stopped
        environment:
            - TZ=America/Sao_Paulo
            - WEB_PORT=9090
            - PUID=1000
            - PGID=1000
        volumes:
            - $HOME/home_media/qbittorrent:/config
            - $HOME/Torrents/Downloads:/downloads
        ports:
            - "9090:8080"
            - "62609:62609"

    bazarr:
        container_name: bazarr
        image: linuxserver/bazarr:latest
        restart: unless-stopped
        environment:
            - PUID=1000
            - PGID=1000
            - TZ=America/Sao_Paulo
        volumes:
            - $HOME/home_media/bazarr:/config
            - $HOME/Torrents/Animes:/animes \
            - $HOME/Torrents/Movies:/movies \
            - $HOME/Torrents/tvseries:/tv \
        ports:
            - "6767:6767"

    overseerr:
        container_name: overseer
        image: linuxserver/overseerr:latest
        restart: unless-stopped
        depends_on:
            - qbittorrent
        environment:
            - TZ=America/Sao_Paulo
            - PORT=5055
        volumes:
            - $HOME/home_media/overseerr:/config
        ports:
            - "5055:5055"

    prowlarr:
        container_name: prowlarr
        image: linuxserver/prowlarr:latest
        restart: unless-stopped
        depends_on:
            - flaresolverr
        environment:
            - PUID=1000
            - PGID=1000
            - TZ=America/Sao_Paulo
        volumes:
            - $HOME/home_media/prowlarr:/config
        ports:
            - "9696:9696"

    flaresolverr:
        container_name: flaresolverr
        image: flaresolverr/flaresolverr:latest
        restart: unless-stopped
        volumes:
            - $HOME/home_media/flaresolverr:/config
        ports:
            - "8191:8191"

    radarr:
        container_name: radarr
        image: linuxserver/radarr:latest
        restart: unless-stopped
        depends_on:
            - qbittorrent
        environment:
            - PGID=1000
            - PUID=1000
            - TZ=America/Sao_Paulo
        volumes:
            - $HOME/home_media/radarr:/config
            - $HOME/Torrents/Movies:/downloads
            - $HOME/Torrents/Downloads:/downloads
        ports:
            - "7878:7878"

    sonarr:
        container_name: sonarr
        image: linuxserver/sonarr:latest
        restart: unless-stopped
        depends_on:
            - qbittorrent
        environment:
            - PGID=1000
            - PUID=1000
            - TZ=America/Sao_Paulo
        volumes:
            - $HOME/home_media/sonarr/config:/config
            - $HOME/Torrents/tvseries:/tv
            - $HOME/Torrents/Animes:/animes
            - $HOME/Torrents/Downloads:/downloads
        ports:
            - "8989:8989"
